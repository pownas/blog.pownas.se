<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} - {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

  <!-- Förhindra tema-flimmer genom att använda sparad inställning direkt vid sidladdning -->
  <script>
    (function() {
      try {
        // Hämta sparad temainställning (garantera att vi faktiskt läser från localStorage)
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

        // Kontrollera om vi har ett sparat tema och använd det direkt
        if (savedTheme === 'light' || savedTheme === 'dark') {
          document.documentElement.setAttribute('data-theme', savedTheme);
          console.log('Applied saved theme:', savedTheme);
        }
        // Annars använd systemets inställning
        else {
          const prefersDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          const defaultTheme = prefersDarkMode ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', defaultTheme);

          // Spara systemets inställning som default
          if (window.localStorage) {
            localStorage.setItem('theme', defaultTheme);
            console.log('Saved system preference as default theme:', defaultTheme);
          }
        }
      } catch (e) {
        // Fallback om localStorage inte är tillgängligt
        console.error('Theme setting error:', e);
      }
    })();
  </script>

  <!-- Mermaid diagram support -->
  <script src="{{ '/assets/js/mermaid.min.js' | relative_url }}"></script>
  <script>
    let mermaidInitialized = false;

    function getMermaidTheme() {
      return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
    }

    function getMermaid() {
      if (!window.mermaid) {
        throw new Error('Mermaid is not available on the page.');
      }

      if (!mermaidInitialized) {
        window.mermaid.initialize({
          startOnLoad: false,
          suppressErrorRendering: true,
          securityLevel: 'antiscript',
          theme: getMermaidTheme()
        });
        mermaidInitialized = true;
      }

      return window.mermaid;
    }

    function findMermaidBlocks(root = document) {
      return Array.from(root.querySelectorAll('pre.mermaid:not([data-mermaid-failed]), pre:not([data-mermaid-failed]) > code.language-mermaid'))
        .map((node) => {
          if (node.matches('pre.mermaid')) {
            return {
              sourceNode: node,
              blockNode: node,
              source: node.innerHTML.trim()
            };
          }

          const blockNode = node.parentElement;
          return blockNode ? {
            sourceNode: node,
            blockNode,
            source: node.textContent?.trim() || ''
          } : null;
        })
        .filter((block) => block && block.source);
    }

    async function renderMermaidDiagrams(root = document) {
      const mermaidBlocks = findMermaidBlocks(root);

      if (!mermaidBlocks.length) {
        return;
      }

      const mermaid = getMermaid();

      for (const [index, mermaidBlock] of mermaidBlocks.entries()) {
        const { blockNode, source } = mermaidBlock;
        const fallbackNode = blockNode.cloneNode(true);
        const diagramNode = document.createElement('div');
        diagramNode.className = 'mermaid-diagram';
        blockNode.replaceWith(diagramNode);

        try {
          const renderId = `mermaid-diagram-${Date.now()}-${index}`;
          const { svg, bindFunctions } = await mermaid.render(renderId, source);
          diagramNode.innerHTML = svg;
          bindFunctions?.(diagramNode);
        } catch (error) {
          fallbackNode.setAttribute('data-mermaid-failed', 'true');
          diagramNode.replaceWith(fallbackNode);

          const errorMessage = document.createElement('p');
          errorMessage.className = 'mermaid-error';
          errorMessage.textContent = 'Mermaid-diagrammet kunde inte renderas. Visar källkoden i stället.';
          fallbackNode.insertAdjacentElement('beforebegin', errorMessage);

          console.error('Failed to render Mermaid diagram:', error);
        }
      }
    }

    window.renderMermaidDiagrams = renderMermaidDiagrams;

    function slugifyHeadingText(text) {
      return (text || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function ensurePostHeadingIds(root = document) {
      const headings = [];

      if (typeof root.querySelectorAll === 'function') {
        headings.push(...root.querySelectorAll('.post.h-entry .post-title, .post.h-entry .post-content h1, .post.h-entry .post-content h2, .post.h-entry .post-content h3, .post.h-entry .post-content h4, .post.h-entry .post-content h5'));
      }

      if (!headings.length) {
        return;
      }

      const usedIds = new Set(
        Array.from(document.querySelectorAll('[id]'))
          .map((element) => element.id)
          .filter(Boolean)
      );

      headings.forEach((heading, index) => {
        if (heading.id) {
          return;
        }

        const baseId = slugifyHeadingText(heading.textContent) || `section-${index + 1}`;
        let candidateId = baseId;
        let suffix = 2;

        while (usedIds.has(candidateId)) {
          candidateId = `${baseId}-${suffix}`;
          suffix += 1;
        }

        heading.id = candidateId;
        usedIds.add(candidateId);
      });
    }

    function enhanceHeadingAnchors(root = document) {
      const postContents = [];

      if (root instanceof Element && root.matches('.post.h-entry .post-content')) {
        postContents.push(root);
      }

      if (typeof root.querySelectorAll === 'function') {
        postContents.push(...root.querySelectorAll('.post.h-entry .post-content'));
      }

      postContents.forEach((postContent) => {
        postContent.querySelectorAll('h1, h2, h3, h4, h5').forEach((heading) => {
          if (heading.dataset.headingAnchorEnhanced === 'true') {
            return;
          }

          if (!heading.id) {
            return;
          }

          const headingText = heading.textContent?.trim();

          if (!heading.id || !headingText) {
            return;
          }

          const textWrapper = document.createElement('span');
          textWrapper.className = 'heading-anchor-text';

          while (heading.firstChild) {
            textWrapper.appendChild(heading.firstChild);
          }

          const anchor = document.createElement('a');
          anchor.className = 'heading-anchor';
          anchor.href = `#${heading.id}`;
          anchor.setAttribute('aria-label', `Länka till rubriken "${headingText}"`);
          anchor.innerHTML = `
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M10.59 13.41a1.996 1.996 0 0 0 2.82 0l3.18-3.18a2 2 0 1 0-2.82-2.82l-1.06 1.06" />
              <path d="M13.41 10.59a1.996 1.996 0 0 0-2.82 0l-3.18 3.18a2 2 0 1 0 2.82 2.82l1.06-1.06" />
            </svg>
          `;

          heading.append(anchor, textWrapper);
          heading.dataset.headingAnchorEnhanced = 'true';
        });
      });
    }

    function buildPostTableOfContents(root = document) {
      const postLayouts = [];

      if (root instanceof Element && root.matches('[data-post-layout]')) {
        postLayouts.push(root);
      }

      if (typeof root.querySelectorAll === 'function') {
        postLayouts.push(...root.querySelectorAll('[data-post-layout]'));
      }

      postLayouts.forEach((postLayout) => {
        if (postLayout.dataset.postTocEnhanced === 'true') {
          return;
        }

        const article = postLayout.querySelector('.post.h-entry');
        const tocContainer = postLayout.querySelector('[data-post-toc-container]');
        const tocList = postLayout.querySelector('[data-post-toc-list]');

        if (!article || !tocContainer || !tocList) {
          return;
        }

        const headingCandidates = [];
        const postTitle = article.querySelector('.post-title[id]');

        if (postTitle) {
          headingCandidates.push(postTitle);
        }

        headingCandidates.push(...article.querySelectorAll('.post-content h1[id], .post-content h2[id], .post-content h3[id], .post-content h4[id], .post-content h5[id]'));

        const seenIds = new Set();
        const tocHeadings = headingCandidates.filter((heading) => {
          const headingText = heading.textContent?.trim();

          if (!heading.id || !headingText || seenIds.has(heading.id)) {
            return false;
          }

          seenIds.add(heading.id);
          return true;
        });

        if (tocHeadings.length < 2) {
          return;
        }

        tocList.innerHTML = '';

        tocHeadings.forEach((heading) => {
          const levelMatch = heading.tagName.match(/^H([1-5])$/);
          const level = levelMatch ? Number(levelMatch[1]) : 1;
          const item = document.createElement('li');
          const link = document.createElement('a');

          item.className = 'post-toc__item';
          item.dataset.level = String(level);

          link.className = 'post-toc__link';
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent?.trim() || heading.id;
          link.style.setProperty('--toc-level', String(level));
          link.dataset.headingId = heading.id;

          item.appendChild(link);
          tocList.appendChild(item);
        });

        const links = Array.from(tocList.querySelectorAll('.post-toc__link'));
        const linksById = new Map(links.map((link) => [link.dataset.headingId, link]));
        const headingOffset = 128;
        let activeId = '';

        const setActiveHeading = (id) => {
          if (!id || id === activeId) {
            return;
          }

          activeId = id;
          links.forEach((link) => {
            const isActive = link.dataset.headingId === id;
            link.classList.toggle('is-active', isActive);

            if (isActive) {
              link.setAttribute('aria-current', 'location');
            } else {
              link.removeAttribute('aria-current');
            }
          });
        };

        const resolveCurrentHeading = () => {
          const bottomThreshold = 2;
          const isAtPageBottom = window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - bottomThreshold;

          if (isAtPageBottom) {
            setActiveHeading(tocHeadings[tocHeadings.length - 1].id);
            return;
          }

          let currentHeading = tocHeadings[0];

          for (const heading of tocHeadings) {
            if (heading.getBoundingClientRect().top - headingOffset <= 0) {
              currentHeading = heading;
              continue;
            }

            break;
          }

          setActiveHeading(currentHeading.id);
        };

        tocList.addEventListener('click', (event) => {
          const link = event.target instanceof Element ? event.target.closest('.post-toc__link') : null;

          if (!link) {
            return;
          }

          const headingId = link.getAttribute('data-heading-id');

          if (headingId) {
            setActiveHeading(headingId);
          }
        });

        if ('IntersectionObserver' in window) {
          const observer = new IntersectionObserver(() => {
            resolveCurrentHeading();
          }, {
            root: null,
            rootMargin: `-${headingOffset}px 0px -65% 0px`,
            threshold: [0, 0.25, 0.5, 1]
          });

          tocHeadings.forEach((heading) => observer.observe(heading));
        }

        window.addEventListener('scroll', resolveCurrentHeading, { passive: true });
        window.addEventListener('resize', resolveCurrentHeading, { passive: true });

        const hashId = window.location.hash ? window.location.hash.replace('#', '') : '';

        if (hashId && linksById.has(hashId)) {
          setActiveHeading(hashId);
        } else {
          resolveCurrentHeading();
        }

        tocContainer.hidden = false;
        postLayout.dataset.postTocEnhanced = 'true';
      });
    }

    window.enhanceHeadingAnchors = enhanceHeadingAnchors;
    window.buildPostTableOfContents = buildPostTableOfContents;

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        void renderMermaidDiagrams();
        ensurePostHeadingIds();
        enhanceHeadingAnchors();
        buildPostTableOfContents();
      }, { once: true });
    } else {
      void renderMermaidDiagrams();
      ensurePostHeadingIds();
      enhanceHeadingAnchors();
      buildPostTableOfContents();
    }
  </script>


  <link rel="icon" href="https://www.pownas.se/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  {% if site.google_analytics %}
    {% include google-analytics.html %}
  {% endif %}
  {% if page.categories %}
  <meta name="keywords" content="{{ page.categories | join: ',' }}">
  {% endif %}
</head>
